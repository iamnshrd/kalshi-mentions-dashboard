<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stream Latency Monitor</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background:#0b1020; color:#e7ecf5; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 20px; }
    .card { background:#141a2e; border:1px solid #23304f; border-radius:14px; padding:14px; box-shadow:0 6px 20px rgba(0,0,0,.2); }
    .top { display:grid; grid-template-columns: 1fr auto auto; gap:10px; align-items:center; margin-bottom:16px; }
    .input, .btn { border:1px solid #2f426a; background:#17233f; color:#e7ecf5; border-radius:10px; padding:10px 12px; }
    .input { width:100%; background:#0f1629; border-color:#23304f; }
    .btn { cursor:pointer; }
    .grid { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:16px; }
    .stream-card { display:grid; gap:10px; }
    .stream-card.best { border-color:#4f86d9; box-shadow:0 0 0 1px rgba(79,134,217,.18), 0 10px 24px rgba(27,53,94,.18); }
    .title-row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .title-block { min-width:0; }
    .title-block strong { display:block; }
    .small-muted { color:#9fb0cf; font-size:12px; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; border:1px solid #31415f; background:#10182d; color:#dbe6f7; white-space:nowrap; }
    .badge.best { background:#274a7a; border-color:#4f86d9; color:#f4f8ff; }
    .player-wrap { aspect-ratio: 16 / 9; width:100%; background:#0f1629; border:1px solid #23304f; border-radius:12px; overflow:hidden; }
    .metrics { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:8px; }
    .metric { background:#10182d; border:1px solid #23304f; border-radius:10px; padding:10px; }
    .metric .label { color:#9fb0cf; font-size:12px; }
    .metric .value { margin-top:3px; font-weight:700; }
    .muted { color:#9fb0cf; }
    .status { font-size: 13px; color:#9fb0cf; }
    .toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index:100; background: rgba(21,30,52,.96); color:#e7ecf5; border:1px solid #31415f; border-radius:12px; padding:10px 14px; box-shadow:0 10px 24px rgba(0,0,0,.35); display:none; }
    .toast.show { display:block; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .top { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card top">
    <input id="queryInput" class="input" placeholder="Type an event query, e.g. Trump Agriculture Celebration">
    <button id="findBtn" class="btn">Find streams</button>
    <div id="clockStatus" class="status">Clock sync: idle</div>
  </div>
  <div id="grid" class="grid"></div>
</div>
<div id="toast" class="toast"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_BASE = 'https://139.84.170.170.nip.io/stream-latency';
const streams = [];
const players = new Map();
let clockOffsetMs = 0;
function toast(text) { const el = document.getElementById('toast'); el.textContent = text; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); }
async function syncClock() { const t0 = Date.now(); const res = await fetch(`${API_BASE}/time`); const data = await res.json(); const t1 = Date.now(); const rtt = t1 - t0; const serverTime = data.now + rtt / 2; clockOffsetMs = serverTime - t1; document.getElementById('clockStatus').textContent = `Clock sync: RTT ${rtt} ms, offset ${Math.round(clockOffsetMs)} ms`; }
async function getStreamMeta(videoId) { const res = await fetch(`${API_BASE}/stream-meta?videoId=${encodeURIComponent(videoId)}`); return res.json(); }
async function findStreams(query) { const res = await fetch(`${API_BASE}/stream-search?q=${encodeURIComponent(query)}`); return res.json(); }
function bestVideoId() { const ranked = streams.filter(s => Number.isFinite(s.latencyMs)).sort((a,b) => a.latencyMs - b.latencyMs); return ranked[0]?.videoId || null; }
function updateBestCards() { const bestId = bestVideoId(); for (const s of streams) { const card = document.getElementById(`card-${s.videoId}`); const badge = document.getElementById(`badge-${s.videoId}`); if (card) card.classList.toggle('best', bestId === s.videoId); if (badge) { badge.classList.toggle('best', bestId === s.videoId); badge.textContent = bestId === s.videoId ? 'best' : 'candidate'; } } }
function renderCards() {
  const grid = document.getElementById('grid'); const bestId = bestVideoId();
  grid.innerHTML = streams.map(s => `
    <div class="card stream-card ${bestId === s.videoId ? 'best' : ''}" id="card-${s.videoId}">
      <div class="title-row">
        <div class="title-block">
          <strong>${s.source || 'YouTube'} — ${s.meta.title || s.title || s.videoId}</strong>
          <div class="small-muted">${s.url}</div>
        </div>
        <span class="badge ${bestId === s.videoId ? 'best' : ''}" id="badge-${s.videoId}">${bestId === s.videoId ? 'best' : 'candidate'}</span>
      </div>
      <div class="player-wrap"><div id="player-${s.videoId}"></div><a href="${s.url}" target="_blank" rel="noopener noreferrer" id="fallback-${s.videoId}" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#9fb0cf;text-decoration:none;background:#0f1629 url('https://i.ytimg.com/vi/${s.videoId}/hqdefault.jpg') center/cover no-repeat;">Open stream</a></div>
      <div class="metrics">
        <div class="metric"><div class="label">Latency</div><div class="value" id="lat-${s.videoId}">—</div></div>
        <div class="metric"><div class="label">Source</div><div class="value" id="src-${s.videoId}">${s.source || 'YouTube'}</div></div>
        <div class="metric"><div class="label">Status</div><div class="value" id="st-${s.videoId}">${s.meta.liveBroadcastContent || 'idle'}</div></div>
        <div class="metric"><div class="label">Start time</div><div class="value small-muted" id="start-${s.videoId}">${s.meta.actualStartTime || s.meta.scheduledStartTime || '—'}</div></div>
      </div>
      <div class="small-muted" id="dbg-${s.videoId}">dbg: waiting</div>
    </div>
  `).join('');
}
function ensurePlayers() {
  for (const s of streams) {
    if (players.has(s.videoId)) continue;
    const p = new YT.Player(`player-${s.videoId}`, {
      videoId: s.videoId,
      playerVars: { autoplay: 1, mute: 1, controls: 1, playsinline: 1 },
      events: {
        onReady: (event) => {
          const fb = document.getElementById(`fallback-${s.videoId}`);
          if (fb) fb.style.display = 'none';
          try {
            event.target.mute();
            event.target.playVideo();
          } catch {}
        },
        onError: () => {
          const fb = document.getElementById(`fallback-${s.videoId}`);
          if (fb) fb.style.display = 'flex';
        },
        onStateChange: () => {},
      }
    });
    players.set(s.videoId, p);
  }
}
async function addCandidate(candidate) {
  if (streams.some(s => s.videoId === candidate.videoId)) return;
  const meta = await getStreamMeta(candidate.videoId);
  streams.push({ ...candidate, meta, latencyMs: null });
  renderCards(); ensurePlayers();
}
function tick() {
  const now = Date.now() + clockOffsetMs; let changed = false;
  for (const s of streams) {
    const p = players.get(s.videoId); if (!p || typeof p.getDuration !== 'function') continue;
    let elapsedSec = 0; let currentTime = 0; let playerState = 'unknown';
    try { elapsedSec = p.getDuration(); } catch {}
    try { currentTime = p.getCurrentTime(); } catch {}
    try { playerState = p.getPlayerState(); } catch {}
    const latEl = document.getElementById(`lat-${s.videoId}`); const stEl = document.getElementById(`st-${s.videoId}`); const dbgEl = document.getElementById(`dbg-${s.videoId}`);
    if (dbgEl) dbgEl.textContent = `dbg: state=${playerState} duration=${Number(elapsedSec || 0).toFixed(1)} current=${Number(currentTime || 0).toFixed(1)} startMs=${s.meta.actualStartTimeMs || 'null'}`;
    if (!elapsedSec || !s.meta.actualStartTimeMs) { if (stEl) stEl.textContent = s.meta.actualStartTimeMs ? 'press play / warming up' : (s.meta.liveBroadcastContent || 'no start time'); if (latEl) latEl.textContent = '—'; s.latencyMs = null; continue; }
    const latencyMs = now - (s.meta.actualStartTimeMs + elapsedSec * 1000); s.latencyMs = latencyMs; changed = true; if (latEl) latEl.textContent = `${Math.round(latencyMs)} ms`; if (stEl) stEl.textContent = latencyMs >= 0 ? 'live' : 'ahead?';
  }
  if (changed) updateBestCards();
}
window.onYouTubeIframeAPIReady = async function() { await syncClock().catch(() => toast('Clock sync failed')); setInterval(() => syncClock().catch(() => {}), 30000); setInterval(tick, 1000); };
document.getElementById('findBtn').addEventListener('click', async () => {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return toast('Type a query first');
  const result = await findStreams(query).catch(() => null);
  if (!result || !result.results || !result.results.length) return toast('No streams found');
  streams.length = 0; players.clear(); renderCards();
  for (const candidate of result.results) await addCandidate(candidate);
  toast(`Added ${result.results.length} stream candidates`);
});
</script>
</body>
</html>
