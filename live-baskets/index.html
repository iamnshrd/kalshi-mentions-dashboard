<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalshi Live Basket Terminal</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background:#0b1020; color:#e7ecf5; }
    a { color:#8cc8ff; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .wrap { max-width: 1760px; margin:0 auto; padding:16px; }
    .card { background:#141a2e; border:1px solid #23304f; border-radius:14px; padding:14px; box-shadow:0 6px 20px rgba(0,0,0,.2); }
    .muted { color:#9fb0cf; }
    .warn { color:#ffd86b; }
    .danger { color:#ff9b9b; }
    .small { font-size:13px; }
    .topbar { position:sticky; top:0; z-index:20; margin-bottom:16px; }
    .topbar-inner { display:grid; grid-template-columns: 1.3fr auto auto auto auto auto auto 1fr; gap:8px; align-items:center; background:#0d1324ee; backdrop-filter: blur(8px); border:1px solid #23304f; border-radius:14px; padding:12px; }
    .input, .select { width:100%; border:1px solid #23304f; background:#0f1629; color:#e7ecf5; border-radius:10px; padding:10px 12px; }
    button { border:1px solid #2f426a; background:#17233f; color:#e7ecf5; padding:10px 12px; border-radius:10px; cursor:pointer; }
    button:hover { background:#1d2d4f; }
    .layout-top { display:grid; grid-template-columns: 300px 1fr; gap:16px; align-items:start; }
    .sticky-col { position:sticky; top:82px; max-height:calc(100vh - 96px); overflow:auto; }
    .strike-list, .member-list, .basket-grid { display:grid; gap:10px; }
    .strike-chip { padding:9px 10px; border:1px solid #23304f; border-radius:10px; background:#10182d; cursor:grab; user-select:none; }
    .strike-chip strong { display:block; }
    .strike-chip small { color:#9fb0cf; display:block; margin-top:3px; }
    .basket-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); align-items:start; }
    .basket-card { background:#10182d; border:1px solid #23304f; border-radius:12px; padding:10px; min-height:152px; display:grid; gap:6px; transition:.15s ease; }
    .basket-card.active { border-color:#5a81d6; box-shadow:0 0 0 1px rgba(90,129,214,.35), 0 0 18px rgba(90,129,214,.14); }
    .basket-head { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .basket-title { display:flex; align-items:center; gap:8px; min-width:0; }
    .basket-dot { width:12px; height:12px; border-radius:999px; flex:0 0 auto; }
    .basket-name { font-weight:700; line-height:1.15; }
    .basket-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .mini-btn { padding:5px 8px; font-size:12px; }
    .signal { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; }
    .signal.green { background:#163929; color:#8be0af; }
    .signal.red { background:#4a1f1f; color:#ff9b9b; }
    .signal.neutral { background:#23304f; color:#b9c7e7; }
    .basket-metrics { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap:8px; }
    .metric { background:#141d34; border:1px solid #23304f; border-radius:10px; padding:8px; min-width:0; }
    .metric .label { color:#9fb0cf; font-size:12px; }
    .metric .value { margin-top:3px; font-weight:700; }
    .sparkline { height:34px; border:1px solid #23304f; border-radius:8px; background:#0c1222; }
    .chip-row { display:flex; gap:6px; flex-wrap:wrap; }
    .member-chip { padding:5px 8px; border-radius:999px; background:#17233f; border:1px solid #2a3d63; font-size:12px; cursor:pointer; }
    .member-chip:hover, .member-chip.hovered { border-color:#8cc8ff; background:#1a2b4d; }
    .dropzone { min-height:48px; border:1px dashed #37507f; border-radius:10px; padding:8px; display:grid; gap:8px; background:#0d1528; }
    .dropzone.empty::before { content:'Drop strikes here'; color:#7084ab; font-size:13px; }
    .inspector-grid { display:grid; gap:10px; }
    .contrib-bar { height:8px; border-radius:999px; background:#243250; overflow:hidden; }
    .contrib-fill { height:100%; background:#4cc9f0; }
    .inspector-section-title { margin:2px 0 4px; font-size:12px; color:#9fb0cf; text-transform:uppercase; letter-spacing:.04em; }
    .chart-section, .timeline-section { margin-top:16px; }
    .chart-controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
    .legend-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .legend-chip { padding:5px 8px; border-radius:999px; border:1px solid #2a3d63; background:#10182d; font-size:12px; cursor:pointer; }
    .legend-chip.off { opacity:.45; }
    #chart { width:100%; height:520px; min-height:520px; }
    .timeline-row { display:flex; gap:8px; overflow:auto; padding-bottom:4px; }
    .timeline-item { white-space:nowrap; padding:6px 10px; border-radius:999px; border:1px solid #23304f; background:#10182d; font-size:12px; }
    .subhead { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px; }
    @media (max-width: 1450px) {
      .layout-top { grid-template-columns: 280px 1fr; }
      .sticky-inspector { grid-column: 1 / -1; position:static; max-height:none; }
      .basket-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .topbar-inner { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 980px) {
      .layout-top { grid-template-columns: 1fr; }
      .sticky-col { position:static; max-height:none; }
      .basket-grid { grid-template-columns: 1fr; }
      #chart { height:420px; min-height:420px; }
      .topbar-inner { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="topbar-inner">
      <input id="marketUrlInput" class="input" placeholder="Paste Kalshi event URL...">
      <button id="loadBtn">Load event</button>
      <button id="refreshBtn">Refresh now</button>
      <button id="saveTemplateBtn">Save template</button>
      <label class="small muted" style="display:flex; align-items:center; gap:8px;"><input id="autoRefreshToggle" type="checkbox"> Auto-refresh</label>
      <select id="refreshInterval" class="select"><option value="5">5s</option><option value="10" selected>10s</option><option value="15">15s</option><option value="30">30s</option></select>
      <select id="modeSelect" class="select"><option value="live">Live snapshots</option></select>
      <div id="loadStatus" class="muted small">Load a Kalshi event to begin.</div>
    </div>
  </div>

  <div class="layout-top">
    <div class="card sticky-col">
      <div class="subhead"><h2 style="margin:0;">Unassigned strikes</h2></div>
      <input id="strikeSearch" class="input" placeholder="Search strikes...">
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
        <button id="addBasketBtn">Create basket</button>
        <button id="seedBasketsBtn">Auto-seed baskets</button>
        <button id="clearAssignmentsBtn">Clear assignments</button>
      </div>
      <label class="small muted" style="display:flex; align-items:center; gap:8px; margin-top:10px;"><input id="onlyMovingToggle" type="checkbox"> Only moving</label>
      <div id="unassignedList" class="strike-list" style="margin-top:12px;"></div>
    </div>

    <div>
      <div class="card">
        <div class="subhead">
          <div>
            <h1 id="pageTitle" style="margin:0; font-size:24px;">Live Basket Terminal</h1>
            <div class="muted small">Baskets first, chart second. Drag strikes into baskets, then inspect the selected basket below.</div>
          </div>
          <div class="small muted" id="eventMetaLabel">—</div>
        </div>
        <div id="basketGrid" class="basket-grid"></div>
      </div>

      <div class="card chart-section">
        <div class="subhead">
          <h2 id="chartTitle" style="margin:0;">Basket chart</h2>
          <div class="small muted" id="coverageLabel">—</div>
        </div>
        <div class="chart-controls">
          <button class="mini-btn" data-chart-mode="avg">avg</button>
          <button class="mini-btn" data-chart-mode="members">members</button>
          <button class="mini-btn" data-chart-mode="leader">leader only</button>
          <select id="compareBasketSelect" class="select" style="width:auto; min-width:170px;"><option value="">compare basket</option></select>
          <label class="small muted" style="display:flex; align-items:center; gap:8px;"><input id="normalizeToggle" type="checkbox"> normalize</label>
          <select id="timeRangeSelect" class="select" style="width:auto;"><option value="5">last 5m</option><option value="15" selected>last 15m</option><option value="30">last 30m</option><option value="60">last 1h</option></select>
        </div>
        <div id="legendChips" class="legend-chips"></div>
        <div id="chart"></div>
      </div>

      <div class="card timeline-section">
        <div class="subhead"><h2 style="margin:0;">Timeline / tape</h2></div>
        <div id="timelineRow" class="timeline-row"></div>
      </div>
    </div>

  </div>
</div>

<script>
const PROXY_BASE = 'https://139.84.170.170.nip.io/kalshi-proxy';
const DEFAULT_BASKETS = [
  { name: 'Domestic politics', color: '#4cc9f0' },
  { name: 'Geopolitics', color: '#f72585' },
  { name: 'Economy / inflation', color: '#ffd166' },
  { name: 'Immigration / border', color: '#72efdd' },
  { name: 'Media / grievance', color: '#c77dff' },
  { name: 'Tails / noise', color: '#95a4c6' },
];
const BASKET_COLORS = ['#4cc9f0','#f72585','#ffd166','#72efdd','#c77dff','#90be6d','#ff8fab','#ff9f1c','#5dade2','#f28482'];
const state = {
  currentEventTicker: null,
  currentUrl: null,
  eventMeta: null,
  markets: [],
  series: [],
  baskets: [],
  basketMembers: {},
  refreshTimer: null,
  liveSnapshots: {},
  selectedBasket: null,
  chartMode: 'avg',
  legendVisibility: {},
  compareBasket: '',
  timeline: [],
  hoverStrike: null,
};
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function fmtPrice(v){return Number.isFinite(v)?v.toFixed(2):'—';}
function fmtSigned(v){return Number.isFinite(v)?`${v>0?'+':''}${v.toFixed(2)}`:'—';}
function fmtTs(v){if(!v)return'—';const d=new Date(v);if(Number.isNaN(d.getTime()))return String(v);return d.toLocaleString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC'})+' UTC';}
function setStatus(text,cls='muted small'){const el=document.getElementById('loadStatus');el.textContent=text;el.className=cls;}
function extractEventTicker(input){const m=String(input||'').trim().match(/\b([a-z0-9]+-\d{2}[a-z]{3}\d+[a-z]?)\b/i);return m?m[1].toUpperCase():null;}
function avg(arr){const v=arr.filter(Number.isFinite);return v.length?v.reduce((a,b)=>a+b,0)/v.length:NaN;}
function sum(arr){const v=arr.filter(Number.isFinite);return v.length?v.reduce((a,b)=>a+b,0):NaN;}
function basketStorageKey(){return state.currentEventTicker?`kalshi-live-baskets:${state.currentEventTicker}`:null;}
function saveAssignments(){const k=basketStorageKey(); if(!k) return; localStorage.setItem(k, JSON.stringify({baskets:state.baskets,basketMembers:state.basketMembers,selectedBasket:state.selectedBasket}));}
function loadAssignments(){const k=basketStorageKey(); if(!k) return false; try{const d=JSON.parse(localStorage.getItem(k)||'null'); if(!d) return false; state.baskets=d.baskets?.length?d.baskets:structuredClone(DEFAULT_BASKETS); state.basketMembers=d.basketMembers||{}; state.selectedBasket=d.selectedBasket||state.baskets[0]?.name||null; return true;}catch{return false;}}
function buildDefaultBaskets(){state.baskets=structuredClone(DEFAULT_BASKETS); state.basketMembers=Object.fromEntries(state.baskets.map(b=>[b.name,[]])); state.selectedBasket=state.baskets[0].name;}
function normalizeAssignments(){const valid=new Set(state.series.map(s=>s.name)); const seen=new Set(); for(const basket of state.baskets){const next=(state.basketMembers[basket.name]||[]).filter(n=>valid.has(n)&&!seen.has(n)); next.forEach(n=>seen.add(n)); state.basketMembers[basket.name]=next;} if(!state.selectedBasket && state.baskets[0]) state.selectedBasket=state.baskets[0].name;}
function extractMarketSnapshotPrice(meta){for(const v of [meta.last_price_dollars,meta.yes_price_dollars,meta.last_price,meta.yes_price,meta.yes_bid_dollars,meta.yes_ask_dollars]){const n=parseFloat(v); if(Number.isFinite(n)) return n*100;} return NaN;}
function extractMarketSnapshotVolume(meta){for(const v of [meta.volume_fp,meta.volume,meta.open_interest_fp]){const n=parseFloat(v); if(Number.isFinite(n)) return n;} return NaN;}
function computeSeriesMetrics(points){const valid=points.filter(p=>Number.isFinite(p.y)); if(!valid.length) return {last:NaN,delta1m:NaN,delta5m:NaN,vol5m:NaN}; const last=valid.at(-1); const prev1=valid.length>=2?valid.at(-2):null; const prev5=valid.length>=6?valid.at(-6):valid[0]; return {last:last.y,delta1m:prev1?(last.y-prev1.y):NaN,delta5m:prev5?(last.y-prev5.y):NaN,vol5m:sum(valid.slice(-5).map(p=>p.volume))};}
function basketStats(name){const members=(state.basketMembers[name]||[]).map(n=>state.series.find(s=>s.name===n)).filter(Boolean); if(!members.length) return {count:0,lastAvg:NaN,delta1mAvg:NaN,delta5mAvg:NaN,vol5m:NaN,breadth:'0/0',leader:null,laggard:null}; const leader=[...members].sort((a,b)=>(b.metrics.delta1m||-999)-(a.metrics.delta1m||-999))[0]; const laggard=[...members].sort((a,b)=>(a.metrics.delta1m||999)-(b.metrics.delta1m||999))[0]; const pos=members.filter(m=>Number.isFinite(m.metrics.delta1m)&&m.metrics.delta1m>0).length; return {count:members.length,lastAvg:avg(members.map(m=>m.metrics.last)),delta1mAvg:avg(members.map(m=>m.metrics.delta1m)),delta5mAvg:avg(members.map(m=>m.metrics.delta5m)),vol5m:sum(members.map(m=>m.metrics.vol5m)),breadth:`${pos}/${members.length}`,leader:leader?.name||null,laggard:laggard?.name||null};}
function signalClass(v){if(!Number.isFinite(v)) return 'neutral'; if(v>0.25) return 'green'; if(v<-0.25) return 'red'; return 'neutral';}
function getUnassigned(){const assigned=new Set(Object.values(state.basketMembers).flat()); const q=(document.getElementById('strikeSearch').value||'').trim().toLowerCase(); const moving=document.getElementById('onlyMovingToggle').checked; return state.series.filter(s=>!assigned.has(s.name)).filter(s=>!q || s.name.toLowerCase().includes(q)).filter(s=>!moving || (Number.isFinite(s.metrics.delta1m)&&Math.abs(s.metrics.delta1m)>0));}
function makeSortable(el){ if(!el||el.dataset.sortableReady==='1') return; Sortable.create(el,{group:'live-baskets',animation:150,onEnd:syncAssignmentsFromDom}); el.dataset.sortableReady='1'; }
function renderUnassigned(){const root=document.getElementById('unassignedList'); const items=getUnassigned(); root.innerHTML=items.map(s=>`<div class="strike-chip" data-strike-name="${esc(s.name)}"><strong>${esc(s.name)}</strong><small>last ${fmtPrice(s.metrics.last)} · 1m ${fmtSigned(s.metrics.delta1m)} · 5m ${fmtSigned(s.metrics.delta5m)}</small></div>`).join('')||'<div class="muted small">No unassigned strikes.</div>'; makeSortable(root);}
function renderBasketBoard(){const root=document.getElementById('basketGrid'); root.innerHTML=state.baskets.map((basket,idx)=>{const members=state.basketMembers[basket.name]||[]; const stats=basketStats(basket.name); const active=state.selectedBasket===basket.name?'active':''; const preview=members.slice(0,5).map(name=>`<span class="member-chip" data-chip-basket="${esc(basket.name)}" data-chip-name="${esc(name)}">${esc(name)}</span>`).join(''); return `<div class="basket-card ${active}" data-select-basket="${esc(basket.name)}"><div class="basket-head"><div class="basket-title"><span class="basket-dot" style="background:${basket.color}"></span><div><div class="basket-name">${esc(basket.name)}</div><div class="muted small">${members.length} strikes · ${esc(stats.leader||'no leader yet')}</div></div></div><div class="basket-actions"><button class="mini-btn" data-rename-basket="${esc(basket.name)}">rename</button><button class="mini-btn" data-delete-basket="${esc(basket.name)}">delete</button></div></div><div style="display:flex; justify-content:space-between; gap:8px; align-items:center;"><span class="signal ${signalClass(stats.delta1mAvg)}">${Number.isFinite(stats.delta1mAvg)?fmtSigned(stats.delta1mAvg)+' c/min':'collecting'}</span><span class="muted small">vol ${fmtPrice(stats.vol5m)}</span></div><div class="sparkline" id="spark-${idx}"></div><div class="chip-row">${preview||'<span class="muted small">No strikes yet.</span>'}</div><div class="dropzone ${members.length?'':'empty'}" data-basket-zone="${esc(basket.name)}">${members.map(name=>{const s=state.series.find(x=>x.name===name); return `<div class="strike-chip" data-strike-name="${esc(name)}"><strong>${esc(name)}</strong><small>last ${fmtPrice(s?.metrics.last)} · 1m ${fmtSigned(s?.metrics.delta1m)}</small></div>`;}).join('')}</div></div>`;}).join(''); root.querySelectorAll('[data-basket-zone]').forEach(makeSortable); root.querySelectorAll('[data-select-basket]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('button')||e.target.closest('.dropzone')) return; state.selectedBasket=el.dataset.selectBasket; rerender();})); root.querySelectorAll('[data-rename-basket]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation(); const next=prompt('Rename basket', btn.dataset.renameBasket); if(next) renameBasket(btn.dataset.renameBasket,next.trim());})); root.querySelectorAll('[data-delete-basket]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation(); removeBasket(btn.dataset.deleteBasket);})); root.querySelectorAll('.member-chip').forEach(chip=>{chip.addEventListener('mouseenter',()=>{state.hoverStrike=chip.dataset.chipName; highlightLegendChip(); buildChart(); chip.classList.add('hovered');}); chip.addEventListener('mouseleave',()=>{state.hoverStrike=null; highlightLegendChip(); buildChart(); chip.classList.remove('hovered');});}); renderSparklines();}
function renderSparklines(){state.baskets.forEach((basket,idx)=>{const el=document.getElementById(`spark-${idx}`); if(!el) return; const members=(state.basketMembers[basket.name]||[]).map(n=>state.series.find(s=>s.name===n)).filter(Boolean); if(!members.length){el.innerHTML=''; return;} const ts=[...new Set(members.flatMap(m=>m.points.map(p=>p.x)))].sort().slice(-15); const y=ts.map(t=>avg(members.map(m=>m.pointMap.get(t)?.y))); Plotly.newPlot(el,[{x:ts,y,mode:'lines',line:{color:basket.color,width:2},hoverinfo:'skip'}],{paper_bgcolor:'#0c1222',plot_bgcolor:'#0c1222',margin:{l:6,r:6,t:6,b:6},xaxis:{visible:false},yaxis:{visible:false}}, {staticPlot:true,displayModeBar:false});});}
function syncAssignmentsFromDom(){const next=Object.fromEntries(state.baskets.map(b=>[b.name,[]])); document.querySelectorAll('[data-basket-zone]').forEach(zone=>{next[zone.dataset.basketZone]=[...zone.querySelectorAll('[data-strike-name]')].map(n=>n.dataset.strikeName);}); state.basketMembers=next; normalizeAssignments(); saveAssignments(); pushTimeline('strike moved between baskets'); rerender();}
function renameBasket(oldName,newName){if(!newName||oldName===newName) return; if(state.baskets.some(b=>b.name===newName)) return; const b=state.baskets.find(x=>x.name===oldName); if(!b) return; b.name=newName; state.basketMembers[newName]=state.basketMembers[oldName]||[]; delete state.basketMembers[oldName]; if(state.selectedBasket===oldName) state.selectedBasket=newName; saveAssignments(); pushTimeline(`basket renamed to ${newName}`); rerender();}
function removeBasket(name){const members=state.basketMembers[name]||[]; state.baskets=state.baskets.filter(b=>b.name!==name); delete state.basketMembers[name]; if(!state.baskets.length) buildDefaultBaskets(); state.basketMembers[state.baskets[0].name]=[...(state.basketMembers[state.baskets[0].name]||[]),...members]; state.selectedBasket=state.baskets[0].name; normalizeAssignments(); saveAssignments(); pushTimeline(`basket deleted: ${name}`); rerender();}
function addBasket(){let i=1,name=`New basket ${i}`; while(state.baskets.some(b=>b.name===name)){i++;name=`New basket ${i}`;} state.baskets.push({name,color:BASKET_COLORS[state.baskets.length%BASKET_COLORS.length]}); state.basketMembers[name]=[]; state.selectedBasket=name; saveAssignments(); pushTimeline(`basket created: ${name}`); rerender();}
function classifyBasketSeed(name){const s=name.toLowerCase(); if(/(iran|israel|nato|nuclear|hormuz|oil|gas|cyprus|turkey|cuba|athens|ottoman)/.test(s)) return 'Geopolitics'; if(/(inflation|tariff|afford|crypto|bitcoin|economy|gasoline|oil)/.test(s)) return 'Economy / inflation'; if(/(ice|dhs|border|illegal|id\b|identification|sanctuary)/.test(s)) return 'Immigration / border'; if(/(biden|democrat|shutdown|save america act|radical left)/.test(s)) return 'Domestic politics'; if(/(fake news|cheat|epic fury)/.test(s)) return 'Media / grievance'; return 'Tails / noise';}
function autoSeedBaskets(){for(const b of state.baskets) state.basketMembers[b.name]=[]; for(const s of state.series){const target=classifyBasketSeed(s.name); if(state.basketMembers[target]) state.basketMembers[target].push(s.name);} normalizeAssignments(); saveAssignments(); pushTimeline('auto-seeded baskets'); rerender();}
function pushTimeline(text){state.timeline.unshift({ts:new Date().toISOString(),text}); state.timeline=state.timeline.slice(0,20); renderTimeline();}
function renderTimeline(){const root=document.getElementById('timelineRow'); root.innerHTML=state.timeline.map(item=>`<div class="timeline-item">${esc(fmtTs(item.ts))} ${esc(item.text)}</div>`).join('') || '<div class="muted small">No timeline items yet.</div>';}
function renderInspector(){}
function filteredPoints(points){const mins=Number(document.getElementById('timeRangeSelect').value||15); const cutoff=Date.now()-mins*60*1000; return points.filter(p=>new Date(p.x).getTime()>=cutoff);}
function norm(values){const valid=values.filter(Number.isFinite); if(!valid.length) return values; const first=valid[0]; return values.map(v=>Number.isFinite(v)?v-first:v);}
function renderLegendChips(){const root=document.getElementById('legendChips'); const names=getChartSeriesNames(); root.innerHTML=names.map(n=>`<span class="legend-chip ${state.legendVisibility[n]===false?'off':''}" data-legend-name="${esc(n)}">${esc(n)}</span>`).join(''); root.querySelectorAll('[data-legend-name]').forEach(chip=>chip.addEventListener('click',()=>{const n=chip.dataset.legendName; state.legendVisibility[n]=state.legendVisibility[n]===false?true:false; buildChart(); renderLegendChips();})); highlightLegendChip();}
function highlightLegendChip(){document.querySelectorAll('[data-legend-name]').forEach(chip=>{chip.style.borderColor = chip.dataset.legendName===state.hoverStrike ? '#8cc8ff' : ''; chip.style.boxShadow = chip.dataset.legendName===state.hoverStrike ? '0 0 0 1px rgba(140,200,255,.35)' : '';});}
function getChartSeriesNames(){const selected=state.selectedBasket; if(!selected) return []; const members=(state.basketMembers[selected]||[]); const names=[]; if(state.chartMode==='avg') names.push(`${selected} avg`); if(state.chartMode==='members') names.push(...members); if(state.chartMode==='leader'){ const leader=basketStats(selected).leader; if(leader) names.push(leader); }
 if(state.compareBasket) names.push(`${state.compareBasket} avg`); return names;}
function buildChart(){const selected=state.selectedBasket; const root=document.getElementById('chart'); if(!selected){root.innerHTML='<div class="muted">Select a basket.</div>'; return;} const traces=[]; const normalize=document.getElementById('normalizeToggle').checked; const selectedMembers=(state.basketMembers[selected]||[]).map(n=>state.series.find(s=>s.name===n)).filter(Boolean); const addBasketAvg=(basketName,color)=>{const members=(state.basketMembers[basketName]||[]).map(n=>state.series.find(s=>s.name===n)).filter(Boolean); if(!members.length) return; const ts=[...new Set(members.flatMap(m=>filteredPoints(m.points).map(p=>p.x)))].sort(); let y=ts.map(t=>avg(members.map(m=>m.pointMap.get(t)?.y))); if(normalize) y=norm(y); const traceName=`${basketName} avg`; if(state.legendVisibility[traceName]===false) return; traces.push({x:ts,y,mode:'lines',name:traceName,line:{width:4,color},opacity:1}); };
 const basket=state.baskets.find(b=>b.name===selected); addBasketAvg(selected,basket?.color||'#4cc9f0'); if(state.chartMode==='members'){ for(const member of selectedMembers){ if(state.legendVisibility[member.name]===false) continue; let pts=filteredPoints(member.points); let y=pts.map(p=>p.y); if(normalize) y=norm(y); traces.push({x:pts.map(p=>p.x),y,mode:'lines',name:member.name,line:{width:state.hoverStrike===member.name?3:1.8,color:basket?.color||'#4cc9f0',dash:state.hoverStrike===member.name?'solid':'dot'},opacity:state.hoverStrike&&state.hoverStrike!==member.name?0.25:0.7}); }}
 if(state.chartMode==='leader'){ const leader=basketStats(selected).leader; const member=selectedMembers.find(m=>m.name===leader); if(member && state.legendVisibility[member.name]!==false){ let pts=filteredPoints(member.points); let y=pts.map(p=>p.y); if(normalize) y=norm(y); traces.push({x:pts.map(p=>p.x),y,mode:'lines',name:member.name,line:{width:3,color:basket?.color||'#4cc9f0'}}); }}
 if(state.compareBasket && state.compareBasket!==selected){ const comp=state.baskets.find(b=>b.name===state.compareBasket); addBasketAvg(state.compareBasket, comp?.color||'#ffd166'); }
 if(!traces.length){ root.innerHTML='<div class="muted">Not enough live points yet. Keep auto-refresh on.</div>'; return; }
 Plotly.newPlot(root,traces,{paper_bgcolor:'#141a2e',plot_bgcolor:'#10182d',font:{color:'#e7ecf5'},hovermode:'x unified',margin:{l:60,r:20,t:10,b:50},xaxis:{gridcolor:'#20304d',title:'Time (UTC)'},yaxis:{gridcolor:'#20304d',title:normalize?'Normalized move':'Price (cents)'},legend:{orientation:'h',y:-0.2,x:0}}, {responsive:true,displaylogo:false}); document.getElementById('chartTitle').textContent=`Basket chart: ${selected}`; const allX=traces.flatMap(t=>t.x); const sorted=[...new Set(allX)].sort(); document.getElementById('coverageLabel').textContent=`${sorted[0]||'—'} → ${sorted.at(-1)||'—'}`; renderLegendChips();}
async function loadEvent(url){const eventTicker=extractEventTicker(url); if(!eventTicker) return setStatus('Could not parse Kalshi event ticker from URL.','warn'); state.currentEventTicker=eventTicker; state.currentUrl=url; setStatus(`Loading ${eventTicker}...`); try{const res=await fetch(`${PROXY_BASE}/api/kalshi-event?market_url=${encodeURIComponent(url)}`); if(!res.ok){const text=await res.text(); throw new Error(`proxy ${res.status} ${text.slice(0,160)}`);} const payload=await res.json(); state.eventMeta=payload.event||null; state.markets=payload.markets||[]; const marketMap=new Map(state.markets.map(m=>[m.ticker,m])); const candleMap=new Map((payload.candlesticks||[]).map(entry=>[entry.market_ticker,entry])); const nowIso=new Date().toISOString(); state.series=state.markets.map(meta=>{const entry=candleMap.get(meta.ticker)||{candlesticks:[]}; const name=meta.yes_sub_title||meta.subtitle||meta.title||meta.ticker; let points=(entry.candlesticks||[]).map(c=>({x:new Date((c.end_period_ts||0)*1000).toISOString(),y:(()=>{const p=c.price?.close_dollars??c.price?.mean_dollars??c.price?.previous_dollars??null; return p==null?NaN:parseFloat(p)*100;})(),volume:c.volume_fp!=null?parseFloat(c.volume_fp):NaN})).filter(p=>Number.isFinite(p.y)); const snapshotPrice=extractMarketSnapshotPrice(meta); const snapshotVolume=extractMarketSnapshotVolume(meta); const prev=state.liveSnapshots[name]||[]; if(!points.length && Number.isFinite(snapshotPrice)) points=[...prev,{x:nowIso,y:snapshotPrice,volume:snapshotVolume}].slice(-240); else if(Number.isFinite(snapshotPrice)) points=[...points,{x:nowIso,y:snapshotPrice,volume:snapshotVolume}].slice(-240); state.liveSnapshots[name]=points; return {name,ticker:meta.ticker,points,pointMap:new Map(points.map(p=>[p.x,p])),metrics:computeSeriesMetrics(points)};}).filter(s=>s.points.length); if(!loadAssignments()) buildDefaultBaskets(); normalizeAssignments(); updateMeta(payload); pushTimeline(`loaded ${payload.event_ticker}`); rerender(); const human=state.eventMeta?.event?.title||state.eventMeta?.title||payload.event_ticker; const mode=(payload.candlesticks||[]).some(x=>(x.candlesticks||[]).length)?'candles':'live snapshots'; setStatus(`Loaded ${human} (${state.series.length} strikes, interval=${payload.period_interval||1}m, mode=${mode}).`); const qp=new URLSearchParams(location.search); qp.set('market_url',url); history.replaceState({},'',`${location.pathname}?${qp.toString()}`);}catch(err){setStatus(`Load error: ${err.message||err}`,'danger');}}
function updateMeta(payload){document.getElementById('pageTitle').textContent='Live Basket Terminal'; const human=state.eventMeta?.event?.title||state.eventMeta?.title||payload.event_ticker||state.currentEventTicker; document.getElementById('eventMetaLabel').textContent=human; document.getElementById('compareBasketSelect').innerHTML='<option value="">compare basket</option>'+state.baskets.map(b=>`<option value="${esc(b.name)}" ${state.compareBasket===b.name?'selected':''}>${esc(b.name)}</option>`).join('');}
async function refreshEvent(){if(!state.currentUrl) return; const prevAssignments=JSON.parse(JSON.stringify(state.basketMembers)); const prevBaskets=JSON.parse(JSON.stringify(state.baskets)); const prevSelected=state.selectedBasket; const prevTimeline=[...state.timeline]; await loadEvent(state.currentUrl); state.baskets=prevBaskets; state.basketMembers=prevAssignments; state.selectedBasket=prevSelected; state.timeline=prevTimeline; normalizeAssignments(); saveAssignments(); rerender(); pushTimeline('manual refresh');}
function rerender(){renderUnassigned(); renderBasketBoard(); buildChart(); renderTimeline(); saveAssignments();}
function updateAutoRefresh(){if(state.refreshTimer) clearInterval(state.refreshTimer); if(!document.getElementById('autoRefreshToggle').checked){state.refreshTimer=null; return;} const sec=Number(document.getElementById('refreshInterval').value||10); state.refreshTimer=setInterval(async()=>{await refreshEvent(); pushTimeline('auto-refresh snapshot');},sec*1000);}

document.getElementById('loadBtn').addEventListener('click',()=>loadEvent(document.getElementById('marketUrlInput').value));
document.getElementById('refreshBtn').addEventListener('click',refreshEvent);
document.getElementById('saveTemplateBtn').addEventListener('click',()=>{saveAssignments(); setStatus('Template saved in browser storage.');});
document.getElementById('autoRefreshToggle').addEventListener('change',updateAutoRefresh);
document.getElementById('refreshInterval').addEventListener('change',updateAutoRefresh);
document.getElementById('strikeSearch').addEventListener('input',renderUnassigned);
document.getElementById('onlyMovingToggle').addEventListener('change',renderUnassigned);
document.getElementById('addBasketBtn').addEventListener('click',addBasket);
document.getElementById('seedBasketsBtn').addEventListener('click',autoSeedBaskets);
document.getElementById('clearAssignmentsBtn').addEventListener('click',()=>{for(const b of state.baskets) state.basketMembers[b.name]=[]; pushTimeline('cleared assignments'); rerender();});
document.querySelectorAll('[data-chart-mode]').forEach(btn=>btn.addEventListener('click',()=>{state.chartMode=btn.dataset.chartMode; buildChart(); renderLegendChips();}));
document.getElementById('compareBasketSelect').addEventListener('change',e=>{state.compareBasket=e.target.value; buildChart();});
document.getElementById('normalizeToggle').addEventListener('change',buildChart);
document.getElementById('timeRangeSelect').addEventListener('change',buildChart);
const qp=new URLSearchParams(location.search); const initial=qp.get('market_url'); if(initial){document.getElementById('marketUrlInput').value=initial; loadEvent(initial);} else {buildDefaultBaskets(); rerender();}
</script>
